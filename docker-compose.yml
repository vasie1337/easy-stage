services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stagemarkt
      POSTGRES_PASSWORD: stagemarkt
      POSTGRES_DB: stagemarkt
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stagemarkt"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - 5432:5432

  meilisearch:
    image: getmeili/meilisearch:v1.6
    environment:
      MEILI_MASTER_KEY: 6daf6cf0f21a0662676c9eb287d4c7a25e82a367
      MEILI_ENV: production
      MEILI_HTTP_ADDR: 0.0.0.0:7700
      MEILI_HTTP_CORS_ORIGIN: "*"
    volumes:
      - meilidata:/meili_data
    ports:
      - "0.0.0.0:7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  scraper:
    build: ./scraper
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://stagemarkt:stagemarkt@postgres:5432/stagemarkt
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: 6daf6cf0f21a0662676c9eb287d4c7a25e82a367
    command: sh -c "python main.py && tail -f /dev/null"
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.scraper.schedule: "0 0 * * * *"
      ofelia.job-exec.scraper.command: "python main.py"

  scheduler:
    image: mcuadros/ofelia:latest
    depends_on:
      - scraper
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  pgdata:
  meilidata: