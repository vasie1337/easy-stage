services:
  postgres:
    image: postgres:16
    container_name: easy-mono-postgres
    environment:
      POSTGRES_USER: scrapers
      POSTGRES_PASSWORD: scrapers
      POSTGRES_DB: scrapers
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ofelia:
    image: mcuadros/ofelia:latest
    container_name: easy-mono-ofelia
    depends_on:
      - aggregator
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  aggregator:
    build:
      context: .
      dockerfile: aggregator/Dockerfile
    container_name: easy-mono-aggregator
    environment:
      DATABASE_URL: postgresql://scrapers:scrapers@postgres:5432/scrapers
      DB_MAX_CONNECTIONS: 50
      SCRAPER_MAX_WORKERS: 200
      SCRAPER_PROXY: ""
    depends_on:
      - postgres
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.scrapers.schedule: "0 * * * *"
      ofelia.job-exec.scrapers.command: "/usr/local/bin/scrapers"
    restart: unless-stopped

volumes:
  postgres_data:
